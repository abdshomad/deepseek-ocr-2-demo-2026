server {
    listen 80;
    server_name localhost;
    absolute_redirect off;
    client_max_body_size 100M;
    root /usr/share/nginx/html;

    # Use Docker's internal DNS resolver with 30s cache TTL
    resolver 127.0.0.11 valid=30s;

    # Serve the portal landing page at root
    location = / {
        index index.html;
    }

    # Proxy GPU dashboard, login, and logout requests to the admin-panel service
    location ~ ^/(gpu|login|logout) {
        proxy_pass http://admin-panel:8000;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy DeepSeek-OCR-2 Next.js (Premium UI)
    location /next {
        proxy_pass http://host.docker.internal:3009;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy DeepSeek-OCR-2-Demo (Core)
    location /v2/ {
        set $upstream_v2 http://deepseek-ocr-2-demo:7860;
        proxy_pass $upstream_v2;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # Proxy DeepSeek-OCR-2-Demo-bao (Bao Edition)
    location /v2-bao/ {
        set $upstream_bao http://deepseek-ocr-2-demo-bao:7861;
        proxy_pass $upstream_bao;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # Proxy DeepSeek-OCR-Demo (Standard/Legacy)
    location /v1/ {
        set $upstream_v1 http://deepseek-ocr-demo:7862;
        proxy_pass $upstream_v1;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }
}
